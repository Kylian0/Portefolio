server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/(appsettings(?:\.[^.]+)?\.json|_framework/blazor\.boot\.json)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|wasm|dll|dat|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

